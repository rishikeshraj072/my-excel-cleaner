{% extends "base.html" %}

{% block title %}Sign In - Excel Cleaner{% endblock %}

{% block content %}
<div class="auth-container d-flex align-items-center justify-content-center">
    <div class="card auth-card glass-panel animate-slide-in">
        <div class="card-body p-5">
            <div class="auth-header text-center mb-4">
                <i class="fa-solid fa-wand-magic-sparkles auth-logo animate-pulse"></i>
                <h2 class="font-outfit fw-bold mt-2">Welcome Back</h2>
                <p class="text-muted">Please sign in to access your Excel Cleaner</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form">
                <div class="mb-4">
                    <label for="username_or_email" class="form-label text-muted small fw-semibold">Username or Email</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon"><i class="fa-regular fa-envelope"></i></span>
                        <input type="text" class="form-control glass-input" id="username_or_email" name="username_or_email" placeholder="Enter username or email" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-muted small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control glass-input" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 font-outfit fw-semibold btn-premium mb-4">
                    Sign In <i class="fa-solid fa-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted">New to the platform?</span>
                <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold ms-1 auth-link">Create an account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
