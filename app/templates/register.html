{% extends "base.html" %}

{% block title %}Create Account - Excel Cleaner{% endblock %}

{% block content %}
<div class="auth-container d-flex align-items-center justify-content-center">
    <div class="card auth-card glass-panel animate-slide-in">
        <div class="card-body p-5">
            <div class="auth-header text-center mb-4">
                <i class="fa-solid fa-wand-magic-sparkles auth-logo animate-pulse"></i>
                <h2 class="font-outfit fw-bold mt-2">Get Started</h2>
                <p class="text-muted">Create your admin account to manage excel data</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST" class="auth-form">
                <div class="mb-3">
                    <label for="username" class="form-label text-muted small fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon"><i class="fa-regular fa-user"></i></span>
                        <input type="text" class="form-control glass-input" id="username" name="username" placeholder="e.g. jone_doe" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label text-muted small fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" class="form-control glass-input" id="email" name="email" placeholder="e.g. john@example.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-muted small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control glass-input" id="password" name="password" placeholder="Create strong password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 font-outfit fw-semibold btn-premium mb-4">
                    Register Account <i class="fa-solid fa-user-plus ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-2">
                <span class="text-muted">Already have an account?</span>
                <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold ms-1 auth-link">Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
